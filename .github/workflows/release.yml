name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to upload release assets

jobs:
  release:
    name: build + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      # Cross-compile full + lite archives for every platform via the Makefile.
      - name: Build release archives
        run: make release VERSION="${GITHUB_REF_NAME}"

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            A terminal UI for exploring ELF, Mach-O and PE binaries — header,
            sections, symbols, disassembly, hex, strings, libraries and
            DWARF-driven source mapping.

            ### Which build do I want?

            | Build | Size | Syntax highlighting |
            |-------|------|---------------------|
            | **full** (`exex-…-<os>-<arch>.tar.gz`) | ~11 MB | Chroma — full multi-language source + asm highlighting |
            | **lite** (`exex-…-<os>-<arch>-lite.tar.gz`) | ~7 MB | built-in minimal highlighter |

            Everything else is identical, and both honour the same themes/colours.
            Pick **lite** for the smaller binary, **full** for the richest colouring.

            ### Install (macOS / Linux)

            ```sh
            tar -xzf exex-${{ github.ref_name }}-<os>-<arch>.tar.gz   # add -lite for the small build
            chmod +x exex && sudo mv exex /usr/local/bin/
            shasum -a 256 -c checksums.txt        # optional: verify
            ```

            On Windows, unzip the `.zip` and put `exex.exe` on your `PATH`.

            ### Usage

            ```
            exex [-debug PATH] [-s STRING] <binary> [goto]
            ```

            Config lives at `$XDG_CONFIG_HOME/exex/config.yaml` (or
            `~/.config/exex/config.yaml`). The bundled `README.md` and
            `config.example.yaml` document the keys, flags and full colour/theme
            schema.
